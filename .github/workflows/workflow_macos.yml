name: MacOS Build

on:
  push:
    paths:
      - '**/*'                   # Include all files in the repository
      - '!appveyor.yml'          # Ignore changes in AppVeyor
      - '!README.md'             # Exclude README
      - '!doc/**'                # Exclude documentation
      - '!**/.github/**'         # Exclude everything in .github folder
      - '.github/workflows/workflow_macos.yml'  # Include MacOs workflow file
  pull_request:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_macos.yml'

jobs:
  macOS:
    timeout-minutes: 120 # Stop job if it exceeds expected build time
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Ensure only arm64 Homebrew is used
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          echo "New PATH: $PATH"
          which brew

      - name: Verify architecture
        run: |
          echo "Architecture check:"
          uname -m
          arch
          sysctl -n machdep.cpu.brand_string
          echo "Brew location:"
          which brew
          echo "Brew architecture:"
          file $(which brew)

      - name: Remove symlinks
        run: |
          # Remove existing symlinks before installing Python
          for symlink in 2to3 idle3 pydoc3 python3 python3-config \
                         2to3-3.11 idle3.11 pydoc3.11 python3.11 python3.11-config \
                         2to3-3.12 idle3.12 pydoc3.12 python3.12 python3.12-config \
                         idle3.13 pydoc3.13 python3.13 python3.13-config; do
            rm -f /opt/homebrew/bin/$symlink
          done

      - name: Install libraries
        run: |
          checkPkgAndInstall() {
            for pkg in "$@"; do
              if brew ls --versions $pkg; then
                brew upgrade $pkg
              else
                brew install $pkg
              fi
            done
          }
          brew update
          brew cleanup
          checkPkgAndInstall pkg-config glew lz4 libjpeg libpng lzo boost libusb libmypaint ccache jpeg-turbo ninja opencv qt@5 gcc
          brew unlink qt

      - name: Set up cache
        run: |
          export PATH="/opt/homebrew/opt/ccache/libexec:$PATH"
          mkdir -p /Users/runner/.ccache

      - uses: actions/cache@v4
        with:
          path: /Users/runner/.ccache
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-

      - name: Build libtiff
        run: |
          cd thirdparty/tiff-4.0.3
          # Update config.sub to support arm64-apple-darwin
          curl -L -o config/config.sub https://raw.githubusercontent.com/autotools-mirror/autoconf/master/build-aux/config.sub
          chmod +x config/config.sub
          # Verify and fix line endings
          sed -i '' 's/\r$//' config/config.sub
          # Check if config.sub is valid
          [ -s config/config.sub ] && head -n 1 config/config.sub | grep -q '^#! */bin/sh' || { echo "Error: Invalid config.sub"; cat config/config.sub | head -n 10; exit 1; }
          CFLAGS='-fPIC' CXXFLAGS='-fPIC' ./configure --disable-lzma
          make -j $(sysctl -n hw.ncpu)

      - name: Build OpenBLAS
        run: |
          cd thirdparty/openblas/xianyi-OpenBLAS-e6e87a2
          export FC=$(brew --prefix gcc)/bin/gfortran
          export CC=clang
          rm -rf *.a *.o param.h
          make getarch CC=$CC CFLAGS="-arch arm64"
          make USE_THREAD=1 BINARY=64 CC=$CC FC=$FC TARGET=ARMV8 NO_SHARED=1 CFLAGS="-arch arm64" LDFLAGS="-arch arm64" -j $(sysctl -n hw.ncpu)
          make PREFIX=$PWD/../../install install
          nm -g ../../install/lib/libopenblas.a | grep -E 'strsv_|sgemv_' || echo "Warning: Expected BLAS symbols not found"
          lipo -info ../../install/lib/libopenblas.a

      - name: Build SuperLU
        run: |
          export OPENBLAS_ROOT=$PWD/thirdparty/install
          cd thirdparty/superlu/SuperLU_4.1
          rm -rf libsuperlu_4.1.a *.o
          export CC=clang
          export FC=$(brew --prefix gcc)/bin/gfortran
          export CFLAGS="-I${OPENBLAS_ROOT}/include -arch arm64"
          export LDFLAGS="-arch arm64"
          make clean
          make USE_VENDOR_BLAS=1 BLASLIB="-L${OPENBLAS_ROOT}/lib -lopenblas" -j $(sysctl -n hw.ncpu)
          lipo -info libsuperlu_4.1.a

      - name: Debug SuperLU Paths
        run: |
          cd thirdparty/superlu/SuperLU_4.1
          ls -l libsuperlu_4.1.a
          file libsuperlu_4.1.a
          otool -L libsuperlu_4.1.a || true

      - name: Build
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix jpeg-turbo)/lib/pkgconfig:$PKG_CONFIG_PATH"
          cd toonz
          mkdir -p build
          cd build
          cmake ../sources -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DQT_PATH=$(brew --prefix qt@5)/lib \
            -DQt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5 \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)/lib/cmake/Qt5 \
            -DWITH_TRANSLATION=OFF \
            -DWITH_SYSTEM_SUPERLU=OFF \
            -DTHIRDPARTY_LIBS_HINTS=$PWD/../../thirdparty/superlu/SuperLU_4.1 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DGL_SILENCE_DEPRECATION=ON
          ninja -j $(sysctl -n hw.ncpu)

      - name: Introduce Libraries and Stuff
        run: |
          cd toonz/build/toonz
          cp -pr ../../../stuff OpenToonz.app/portablestuff
          QT_DEPLOY=$(brew --prefix qt@5)/bin/macdeployqt
          echo "Using macdeployqt from: $QT_DEPLOY"
          $QT_DEPLOY OpenToonz.app -verbose=2 -always-overwrite \
            -executable=OpenToonz.app/Contents/MacOS/lzocompress \
            -executable=OpenToonz.app/Contents/MacOS/lzodecompress \
            -executable=OpenToonz.app/Contents/MacOS/tcleanup \
            -executable=OpenToonz.app/Contents/MacOS/tcomposer \
            -executable=OpenToonz.app/Contents/MacOS/tconverter \
            -executable=OpenToonz.app/Contents/MacOS/tfarmcontroller \
            -executable=OpenToonz.app/Contents/MacOS/tfarmserver

      - name: Strip Signatures from Libraries
        run: |
          cd toonz/build/toonz/OpenToonz.app/Contents/Frameworks
          for lib in *.dylib; do
            codesign --remove-signature "$lib" || true
          done

      - name: Modify Library Paths
        run: |
          cd toonz/build/toonz/OpenToonz.app/Contents/Frameworks
          for TARGETLIB in *.dylib; do
            otool -L "$TARGETLIB" | grep ".dylib" | grep -v "$TARGETLIB" | grep -v "@executable_path/../Frameworks" | awk '{print $1}' | while read -r FROMPATH; do
              LIBNAME=$(basename "$FROMPATH")
              if [[ -e ./$LIBNAME ]]; then
                install_name_tool -change "$FROMPATH" "@executable_path/../Frameworks/$LIBNAME" "$TARGETLIB"
              fi
            done
          done

      - name: Create Artifact
        run: |
          cd toonz/build/toonz
          echo "Creating DMG..."

          QT_DEPLOY=$(brew --prefix qt@5)/bin/macdeployqt
          ATTEMPT=1
          until $QT_DEPLOY OpenToonz.app -dmg -verbose=0 && [ -f OpenToonz.dmg ]; do
            echo "Attempt $ATTEMPT failed to build DMG."
            if [ $ATTEMPT -eq 10 ]; then
              echo ">>> DMG file creation failed after 10 attempts. Aborting!"
              exit 1
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Retrying in 10 seconds..."
            sleep 10
          done
          echo "DMG created successfully."

      - uses: actions/upload-artifact@v4
        with:
          name: Opentoonz-${{ runner.os }}-${{ github.sha }}
          path: toonz/build/toonz/OpenToonz.dmg