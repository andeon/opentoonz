name: MacOS Build

on:
  push:
    paths:
      - '**/*'                   # Include all files in the repository
      - '!appveyor.yml'          # Ignore changes in AppVeyor
      - '!README.md'             # Exclude README
      - '!doc/**'                # Exclude documentation
      - '!**/.github/**'         # Exclude everything in .github folder
      - '.github/workflows/workflow_macos.yml'  # Include MacOS workflow file
  pull_request:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_macos.yml'

jobs:
  macOS:
    timeout-minutes: 90 # Stop job if it exceeds expected build time
    # try force -x86_64 to avoid arm64 headaches
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      # New step: Install Rosetta 2 and x86_64 Homebrew
      - name: Install Rosetta 2 and x86_64 Homebrew
        run: |
          # Install Rosetta 2 for x86_64 emulation (ignore if already installed)
          /usr/sbin/softwareupdate --install-rosetta --agree-to-license || true
          
          # Install Homebrew for x86_64 in /usr/local (non-interactive)
          NONINTERACTIVE=1 arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          
          # Set up environment for x86_64 Homebrew (add to PATH)
          eval "$(arch -x86_64 /usr/local/bin/brew shellenv)"

      - name: Clean Python symlinks
        run: |
          # Remove potentially conflicting Python symlinks (run under x86_64)
          arch -x86_64 bash -c '
            find /usr/local/bin -type l \( -name "python*" -o -name "pip*" -o -name "2to3*" -o -name "idle*" -o -name "pydoc*" \) -print0 | while IFS= read -r -d "" link; do
              if file -b "$link" | grep -q "symbolic link to .*Python.framework"; then
                echo "Removing $link"
                rm "$link"
              fi
            done
            # Ensure Homebrew Python is properly linked
            for py_version in python@3.11 python@3.12 python@3.13; do
              if /usr/local/bin/brew list --versions $py_version >/dev/null 2>&1; then
                /usr/local/bin/brew unlink $py_version || true
              fi
            done
            # Install python@3.13 if not present, then link it
            if ! /usr/local/bin/brew list --versions python@3.13 >/dev/null 2>&1; then
              echo "Installing python@3.13..."
              /usr/local/bin/brew install python@3.13 || { echo "Failed to install python@3.13"; exit 1; }
            fi
            /usr/local/bin/brew link --overwrite --force python@3.13 || true
          '

      - name: Install libraries (force x86_64)
        run: |
          # Set up environment for x86_64 Homebrew
          eval "$(arch -x86_64 /usr/local/bin/brew shellenv)"
          
          # Now update and clean the x86_64 Homebrew
          arch -x86_64 /usr/local/bin/brew update
          arch -x86_64 /usr/local/bin/brew cleanup
          
          checkPkgAndInstall() {
            for pkg in "$@"; do
              if arch -x86_64 /usr/local/bin/brew list --versions $pkg > /dev/null 2>&1; then
                echo "$pkg already installed. Upgrading..."
                arch -x86_64 /usr/local/bin/brew upgrade $pkg || true
              else
                echo "Installing $pkg..."
                arch -x86_64 /usr/local/bin/brew install $pkg || { echo "Failed to install $pkg"; exit 1; }
              fi
            done
          }
          
          checkPkgAndInstall pkg-config glew lz4 libjpeg libpng lzo boost libusb libmypaint ccache jpeg-turbo ninja opencv openjph openexr qt@5
          arch -x86_64 /usr/local/bin/brew unlink qt || true

      - name: Set up cache
        run: |
          export PATH="/usr/local/opt/ccache/libexec:$PATH"
          mkdir -p /Users/runner/.ccache

      - uses: actions/cache@v4
        with:
          path: /Users/runner/.ccache
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-

      - name: Build libtiff
        run: |
          cd thirdparty/tiff-4.0.3
          CFLAGS='-fPIC' CXXFLAGS='-fPIC' ./configure --disable-lzma
          make -j $(sysctl -n hw.ncpu)
          sudo make install  # Use sudo here to get permission

      - name: Build
        run: |
          export PKG_CONFIG_PATH="/usr/local/opt/jpeg-turbo/lib/pkgconfig:$PKG_CONFIG_PATH"
          cd toonz
          rm -rf build
          mkdir -p build
          cd build

          # Force build Intel arch on ARM64 runners
          export CFLAGS="-arch x86_64 $CFLAGS"
          export CXXFLAGS="-arch x86_64 $CXXFLAGS"
          export LDFLAGS="-arch x86_64 $LDFLAGS"

          cmake ../sources -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DQT_PATH=$(arch -x86_64 /usr/local/bin/brew --prefix qt@5)/lib \
            -DQt5_DIR=$(arch -x86_64 /usr/local/bin/brew --prefix qt@5)/lib/cmake/Qt5 \
            -DCMAKE_PREFIX_PATH=$(arch -x86_64 /usr/local/bin/brew --prefix qt@5)/lib/cmake/Qt5 \
            -DWITH_TRANSLATION=OFF

          ninja -j $(sysctl -n hw.ncpu)

      - name: Introduce Libraries and Stuff
        run: |
          cd toonz/build/toonz
          cp -pr ../../../stuff OpenToonz.app/portablestuff
          arch -x86_64 /usr/local/opt/qt@5/bin/macdeployqt OpenToonz.app -verbose=0 -always-overwrite \
            -executable=OpenToonz.app/Contents/MacOS/lzocompress \
            -executable=OpenToonz.app/Contents/MacOS/lzodecompress \
            -executable=OpenToonz.app/Contents/MacOS/tcleanup \
            -executable=OpenToonz.app/Contents/MacOS/tcomposer \
            -executable=OpenToonz.app/Contents/MacOS/tconverter \
            -executable=OpenToonz.app/Contents/MacOS/tfarmcontroller \
            -executable=OpenToonz.app/Contents/MacOS/tfarmserver

      - name: Modify Library Paths
        run: |
          cd toonz/build/toonz/OpenToonz.app/Contents/Frameworks
          for TARGETLIB in *.dylib; do
            otool -L "$TARGETLIB" | grep ".dylib" | grep -v "$TARGETLIB" | grep -v "@executable_path/../Frameworks" | awk '{print $1}' | while read -r FROMPATH; do
              LIBNAME=$(basename "$FROMPATH")
              if [[ -e ./$LIBNAME ]]; then
                install_name_tool -change "$FROMPATH" "@executable_path/../Frameworks/$LIBNAME" "$TARGETLIB"
              fi
            done
          done

      - name: Create Artifact
        run: |
          cd toonz/build/toonz
          echo "Creating DMG..."
          ATTEMPT=1
          until arch -x86_64 /usr/local/opt/qt@5/bin/macdeployqt OpenToonz.app -dmg -verbose=0 && [ -f OpenToonz.dmg ]; do
            echo "Attempt $ATTEMPT failed to build DMG."
            if [ $ATTEMPT -eq 10 ]; then
              echo ">>> DMG file creation failed after 10 attempts. Aborting!"
              exit 1
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Retrying in 5 seconds..."
            sleep 5
          done
          echo "DMG created successfully."

      - uses: actions/upload-artifact@v4
        with:
          name: Opentoonz-${{ runner.os }}-${{ github.sha }}
          path: toonz/build/toonz/OpenToonz.dmg