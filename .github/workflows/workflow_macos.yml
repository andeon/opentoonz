name: MacOS Build

on:
  push:
    paths:
      - '**/*'                                  # Include all files in the repository
      - '!appveyor.yml'                         # Ignore changes in AppVeyor
      - '!README.md'                            # Exclude README
      - '!doc/**'                               # Exclude documentation
      - '!**/.github/**'                        # Exclude everything in .github folder
      - '.github/workflows/workflow_macos.yml'  # Include MacOs workflow file
  pull_request:
    paths:
      - '**/*'
      - '!appveyor.yml'
      - '!README.md'
      - '!doc/**'
      - '!**/.github/**'
      - '.github/workflows/workflow_macos.yml'

jobs:
  macOS:
    timeout-minutes: 90 # Stop job if it exceeds expected build time
    # Stick with macOS 13 to avoid arm64 headaches on macOS 15
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Clean Python symlinks
        run: |
          # Remove potentially conflicting Python symlinks
          find /usr/local/bin -type l \( -name "python*" -o -name "pip*" -o -name "2to3*" -o -name "idle*" -o -name "pydoc*" \) \
            -exec sh -c 'file -b {} | grep -q "symbolic link to .*Python.framework" && echo "Removing {}" && rm {}' \;
          for py_version in python@3.11 python@3.12 python@3.13; do
            if brew list --versions $py_version >/dev/null; then
              brew unlink $py_version && echo "Unlinked $py_version" || echo "Failed to unlink $py_version"
            fi
          done
          brew link --overwrite --force python@3.13 && echo "Linked python@3.13" || echo "Failed to link python@3.13"

          
      - name: Install libraries
        run: |
          checkPkgAndInstall() {
            for pkg in "$@"; do
              if brew ls --versions $pkg; then
                brew upgrade $pkg
              else
                brew install $pkg
              fi
            done
          }
          brew update
          checkPkgAndInstall pkg-config glew lz4 libjpeg libpng lzo boost libusb libmypaint ccache jpeg-turbo ninja opencv openjph openexr superlu qt@5
          brew unlink qt
      - name: Set up cache
        run: |
          export PATH="$(brew --prefix ccache)/libexec:$PATH"
          mkdir -p /Users/runner/.ccache
      - uses: actions/cache@v4
        with:
          path: /Users/runner/.ccache
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-

      - name: Build libtiff
        run: |
          set -x
          cd thirdparty/tiff-4.0.3
          export PKG_CONFIG_PATH="/Users/runner/local/lib/pkgconfig:$(brew --prefix jpeg-turbo)/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH before configure: $PKG_CONFIG_PATH"
          CFLAGS='-fPIC' CXXFLAGS='-fPIC' ./configure --disable-lzma --prefix=/Users/runner/local --with-jpeg-lib-dir=$(brew --prefix jpeg-turbo)/lib --with-jpeg-include-dir=$(brew --prefix jpeg-turbo)/include
          make -j $(sysctl -n hw.ncpu)
          make install
          echo "PKG_CONFIG_PATH after install: $PKG_CONFIG_PATH"

      - name: Build
        run: |
          export PKG_CONFIG_PATH="/Users/runner/local/lib/pkgconfig:$(brew --prefix jpeg-turbo)/lib/pkgconfig:$PKG_CONFIG_PATH"
          cd toonz
          rm -rf build
          mkdir -p build
          cd build
          QT_PREFIX=$(brew --prefix qt@5)
          cmake ../sources -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DQT_PATH=$QT_PREFIX/lib \
            -DQt5_DIR=$QT_PREFIX/lib/cmake/Qt5 \
            -DCMAKE_PREFIX_PATH="/Users/runner/local;$QT_PREFIX/lib/cmake/Qt5" \
            -DWITH_TRANSLATION=OFF || { echo "CMake configuration failed"; exit 1; }
          ninja -j $(sysctl -n hw.ncpu) || { echo "Ninja build failed"; exit 1; }

      - name: Introduce Libraries and Stuff
        run: |
          cd toonz/build/toonz
          cp -pr ../../../stuff OpenToonz.app/portablestuff || { echo "Failed to copy stuff directory"; exit 1; }
          QT_PREFIX=$(brew --prefix qt@5)
          echo "Qt@5 prefix: $QT_PREFIX"
          ls -l "$QT_PREFIX/bin"
          if [ ! -f "$QT_PREFIX/bin/macdeployqt" ]; then
            echo "Error: macdeployqt not found at $QT_PREFIX/bin/macdeployqt"
            exit 1
          fi
          "$QT_PREFIX/bin/macdeployqt" OpenToonz.app -verbose=2 -always-overwrite \
            -executable=OpenToonz.app/Contents/MacOS/lzocompress \
            -executable=OpenToonz.app/Contents/MacOS/lzodecompress \
            -executable=OpenToonz.app/Contents/MacOS/tcleanup \
            -executable=OpenToonz.app/Contents/MacOS/tcomposer \
            -executable=OpenToonz.app/Contents/MacOS/tconverter \
            -executable=OpenToonz.app/Contents/MacOS/tfarmcontroller \
            -executable=OpenToonz.app/Contents/MacOS/tfarmserver

      - name: Ensure qt.conf
        run: |
          cd toonz/build/toonz/OpenToonz.app/Contents/Resources
          echo "[Paths]" > qt.conf
          echo "Plugins = PlugIns" >> qt.conf
          cat qt.conf
          ls -l ../PlugIns || { echo "PlugIns directory not found"; exit 1; }

      - name: Modify Library Paths
        run: |
          cd toonz/build/toonz/OpenToonz.app/Contents/Frameworks
          echo "Starting library path modification at $(date)"
          for TARGETLIB in *.dylib; do
            if otool -L "$TARGETLIB" | grep -q "@executable_path/../Frameworks"; then
              echo "Skipping $TARGETLIB, already processed"
              continue
            fi
            echo "Processing $TARGETLIB"
            otool -L "$TARGETLIB"
            otool -L "$TARGETLIB" | grep ".dylib" | grep -v "$TARGETLIB" | grep -v "@executable_path/../Frameworks" | awk '{print $1}' | while read -r FROMPATH; do
              LIBNAME=$(basename "$FROMPATH")
              if [[ -e ./$LIBNAME ]]; then
                echo "Changing $FROMPATH to @executable_path/../Frameworks/$LIBNAME in $TARGETLIB"
                install_name_tool -change "$FROMPATH" "@executable_path/../Frameworks/$LIBNAME" "$TARGETLIB" || { echo "Failed to update $TARGETLIB"; exit 1; }
              else
                echo "Warning: $LIBNAME not found in Frameworks for $TARGETLIB"
              fi
            done
            echo "Updated dependencies for $TARGETLIB:"
            otool -L "$TARGETLIB"
          done

      - name: Re-sign Application
        run: |
          cd toonz/build/toonz
          codesign -f -s "-" OpenToonz.app/Contents/Frameworks/*.dylib
          codesign -f -s "-" OpenToonz.app

      - name: Create Artifact
        run: |
          cd toonz/build/toonz
          echo "Creating DMG..."
          QT_PREFIX=$(brew --prefix qt@5)
          "$QT_PREFIX/bin/macdeployqt" OpenToonz.app -dmg -verbose=2 || { echo "DMG creation failed"; exit 1; }
          ls -l OpenToonz.dmg || { echo "DMG file not found"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: Opentoonz-${{ runner.os }}-${{ github.sha }}
          path: toonz/build/toonz/OpenToonz.dmg
