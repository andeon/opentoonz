name: Linux Code Analysis

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360  # 6 hours
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build ccache \
            libboost-all-dev qtbase5-dev qt5-qmake qtscript5-dev qttools5-dev \
            qttools5-dev-tools qtmultimedia5-dev qtwayland5 libqt5svg5-dev \
            libqt5opengl5-dev libqt5multimedia5-plugins libqt5serialport5-dev \
            libsuperlu-dev liblz4-dev libusb-1.0-0-dev liblzo2-dev libpng-dev \
            libjpeg-dev libglew-dev freeglut3-dev libfreetype6-dev libjson-c-dev \
            libmypaint-dev libopencv-dev libturbojpeg-dev libomp-dev libfuse2 \
            clang-14 llvm-14 libclang-14-dev llvm-14-dev \
            clang-tidy pkg-config

      - name: Install IWYU (Include-What-You-Use)
        if: matrix.compiler == 'clang'
        run: |
          git clone --recursive https://github.com/include-what-you-use/include-what-you-use.git
          cd include-what-you-use
          git checkout clang_14
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_PREFIX_PATH="/usr/lib/llvm-14" \
            -DCMAKE_C_COMPILER=clang-14 \
            -DCMAKE_CXX_COMPILER=clang++-14
          ninja
          sudo ninja install
          
          IWYU_DIR=$(include-what-you-use -print-resource-dir 2>/dev/null || true)
          CLANG_DIR=$(clang -print-resource-dir)
          if [ -n "$IWYU_DIR" ] && [ ! -e "$IWYU_DIR" ]; then
            sudo mkdir -p "$(dirname "$IWYU_DIR")"
            sudo ln -s "$CLANG_DIR" "$IWYU_DIR"
          fi

      - name: Set up cache
        run: mkdir -p /home/runner/.ccache

      - uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-
            ${{ runner.os }}-

      - name: Build libtiff
        run: |
          if [ ! -f thirdparty/tiff-4.0.3/libtiff.a ]; then
            cd thirdparty/tiff-4.0.3
            CFLAGS='-fPIC' CXXFLAGS='-fPIC' ./configure --disable-jbig
            make -j$(nproc)
          fi

      - name: Build
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          mkdir -p toonz/build
          cd toonz/build
          cmake ../sources -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DWITH_TRANSLATION=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          ninja

  iwyu-chunked:
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 360  # 6 hours
    strategy:
      matrix:
        chunk: [1, 2, 3, 4]  # Divide os arquivos em 4 chunks
    steps:
      - uses: actions/checkout@v4

      - name: Run IWYU for chunk ${{ matrix.chunk }}
        if: matrix.chunk
        run: |
          echo "Running IWYU for chunk ${{ matrix.chunk }}..."
          
          # Run IWYU using the generated compile_commands.json
          cd toonz/build
          
          # Filtra os arquivos com base no chunk
          jq -r '.[].file' compile_commands.json | grep -E "^.*/sources/.*\.(cpp|c)$" > source_files.txt

          # Divide os arquivos em chunks
          total_files=$(wc -l < source_files.txt)
          files_per_chunk=$((total_files / 4))  # Divide em 4 partes

          # Define o intervalo de arquivos a serem processados
          start_line=$(( (matrix.chunk - 1) * files_per_chunk + 1 ))
          end_line=$(( matrix.chunk * files_per_chunk ))

          # Pega o intervalo de arquivos para este chunk
          sed -n "${start_line},${end_line}p" source_files.txt > chunk_files.txt

          # Condicional: Roda IWYU com mapeamento para Qt apenas para os chunks 1 e 2
          if [[ "${matrix.chunk}" -le 2 ]]; then
            echo "Running IWYU for Qt files (with mapping)..."
            # Filtra os arquivos que são Qt (contêm 'Q')
            grep '/sources/.*Q.*\.cpp' chunk_files.txt | xargs -n 1 -P $(nproc) -I {} \
              iwyu_tool.py -p toonz/build "{}" -- -Xiwyu --mapping_file=/usr/local/share/include-what-you-use/qt5_11.imp \
              2>/dev/null | tee iwyu_report_qt.txt
          else
            echo "Running IWYU for non-Qt files (no mapping)..."
            # Filtra os arquivos que **não** são Qt
            grep -v '/sources/.*Q.*\.cpp' chunk_files.txt | xargs -n 1 -P $(nproc) -I {} \
              iwyu_tool.py -p toonz/build "{}" -- -Xiwyu \
              2>/dev/null | tee iwyu_report_non_qt.txt
          fi

          # Verificação do IWYU
          if [[ "${matrix.chunk}" -le 2 ]]; then
            if grep -q "should remove" iwyu_report_qt.txt; then
              echo "❌ IWYU found unnecessary headers in Qt files!"
            else
              echo "✅ IWYU OK for Qt files!"
            fi
          else
            if grep -q "should remove" iwyu_report_non_qt.txt; then
              echo "❌ IWYU found unnecessary headers in non-Qt files!"
            else
              echo "✅ IWYU OK for non-Qt files!"
            fi
          fi
