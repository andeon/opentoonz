name: Linux Code Analysis

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360  # 6 hours
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build ccache \
            libboost-all-dev qtbase5-dev qt5-qmake qtscript5-dev qttools5-dev \
            qttools5-dev-tools qtmultimedia5-dev qtwayland5 libqt5svg5-dev \
            libqt5opengl5-dev libqt5multimedia5-plugins libqt5serialport5-dev \
            libsuperlu-dev liblz4-dev libusb-1.0-0-dev liblzo2-dev libpng-dev \
            libjpeg-dev libglew-dev freeglut3-dev libfreetype6-dev libjson-c-dev \
            libmypaint-dev libopencv-dev libturbojpeg-dev libomp-dev libfuse2 \
            clang-14 llvm-14 libclang-14-dev llvm-14-dev \
            clang-tidy pkg-config

      - name: Install IWYU (Include-What-You-Use)
        if: matrix.compiler == 'clang'
        run: |
          git clone --recursive https://github.com/include-what-you-use/include-what-you-use.git
          cd include-what-you-use
          git checkout clang_14
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_PREFIX_PATH="/usr/lib/llvm-14" \
            -DCMAKE_C_COMPILER=clang-14 \
            -DCMAKE_CXX_COMPILER=clang++-14
          ninja
          sudo ninja install
          
          IWYU_DIR=$(include-what-you-use -print-resource-dir 2>/dev/null || true)
          CLANG_DIR=$(clang -print-resource-dir)
          if [ -n "$IWYU_DIR" ] && [ ! -e "$IWYU_DIR" ]; then
            sudo mkdir -p "$(dirname "$IWYU_DIR")"
            sudo ln -s "$CLANG_DIR" "$IWYU_DIR"
          fi

      - name: Set up cache
        run: mkdir -p /home/runner/.ccache

      - uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-
            ${{ runner.os }}-

      - name: Build libtiff
        run: |
          if [ ! -f thirdparty/tiff-4.0.3/libtiff.a ]; then
            cd thirdparty/tiff-4.0.3
            CFLAGS='-fPIC' CXXFLAGS='-fPIC' ./configure --disable-jbig
            make -j$(nproc)
          fi

      - name: Build
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          mkdir -p toonz/build
          cd toonz/build
          cmake ../sources -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DWITH_TRANSLATION=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          ninja

      - name: Upload build directory as artifact
        if: matrix.compiler == 'clang'
        uses: actions/upload-artifact@v4
        with:
          name: toonz-build-dir
          path: toonz/build

  iwyu-chunked:
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      matrix:
        chunk: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: toonz-build-dir
          path: toonz/build

      - name: Run IWYU for chunk ${{ matrix.chunk }}
        run: |
          echo "Running IWYU for chunk ${{ matrix.chunk }}..."
          cd toonz/build

          if [ ! -f compile_commands.json ]; then
            echo "❌ compile_commands.json not found!"
            exit 1
          fi

          jq -r '.[].file' compile_commands.json | grep -E "\.(cpp|c)$" > source_files.txt

          total_files=$(wc -l < source_files.txt)
          echo "Found $total_files source files"

          files_per_chunk=$(( (total_files + 3) / 4 ))
          chunk=${{ matrix.chunk }}
          start_line=$(( (chunk - 1) * files_per_chunk + 1 ))
          end_line=$(( chunk * files_per_chunk ))

          echo "Processing lines $start_line to $end_line"
          sed -n "${start_line},${end_line}p" source_files.txt > chunk_files.txt

          chunk_count=$(wc -l < chunk_files.txt)
          echo "Processing $chunk_count files in chunk $chunk"
          cat chunk_files.txt

          if [ "$chunk" -le 2 ]; then
            echo "Running IWYU for Qt files (with mapping)..."
            grep '/sources/.*Q.*\.cpp' chunk_files.txt > qt_files.txt
            cat qt_files.txt
            cat qt_files.txt | xargs -r -n 1 \
              iwyu_tool.py -p . "{}" -- -Xiwyu --mapping_file=/usr/local/share/include-what-you-use/qt5_11.imp \
              2>&1 | tee iwyu_report_qt.txt
          else
            echo "Running IWYU for non-Qt files (no mapping)..."
            grep -v '/sources/.*Q.*\.cpp' chunk_files.txt > non_qt_files.txt
            cat non_qt_files.txt
            cat non_qt_files.txt | xargs -r -n 1 \
              iwyu_tool.py -p . "{}" -- -Xiwyu \
              2>&1 | tee iwyu_report_non_qt.txt
          fi

          # Certifique-se de que os arquivos de relatório contenham a saída do IWYU
          if [ -f iwyu_report_qt.txt ]; then
            echo "✅ IWYU OK for Qt files!"
            cat iwyu_report_qt.txt
          fi
          if [ -f iwyu_report_non_qt.txt ]; then
            echo "✅ IWYU OK for non-Qt files!"
            cat iwyu_report_non_qt.txt
          fi

