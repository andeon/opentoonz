name: Enhanced OpenToonz Code Analysis

on: [push, pull_request]

jobs:
  build:
    name: Build with ${{ matrix.compiler }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config ninja-build ccache \
            libboost-all-dev qtbase5-dev qt5-qmake qtscript5-dev qttools5-dev \
            qttools5-dev-tools qtmultimedia5-dev qtwayland5 libqt5svg5-dev \
            libqt5opengl5-dev libqt5multimedia5-plugins libqt5serialport5-dev \
            libsuperlu-dev liblz4-dev libusb-1.0-0-dev liblzo2-dev libpng-dev \
            libjpeg-dev libglew-dev freeglut3-dev libfreetype6-dev libjson-c-dev \
            libmypaint-dev libopencv-dev libturbojpeg-dev libomp-dev libfuse2 \
            clang-14 llvm-14 libclang-14-dev llvm-14-dev \
            clang-tidy jq

      - name: Set up ccache directory
        run: mkdir -p /home/runner/.ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-
            ${{ runner.os }}-

      - name: Install IWYU (Include-What-You-Use)
        if: matrix.compiler == 'clang'
        run: |
          git clone --recursive https://github.com/include-what-you-use/include-what-you-use.git
          cd include-what-you-use
          git checkout clang_14
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_PREFIX_PATH="/usr/lib/llvm-14" \
            -DCMAKE_C_COMPILER=clang-14 \
            -DCMAKE_CXX_COMPILER=clang++-14
          ninja
          sudo ninja install

          IWYU_DIR=$(include-what-you-use -print-resource-dir 2>/dev/null || true)
          CLANG_DIR=$(clang -print-resource-dir)
          if [ -n "$IWYU_DIR" ] && [ ! -e "$IWYU_DIR" ]; then
            sudo mkdir -p "$(dirname "$IWYU_DIR")"
            sudo ln -s "$CLANG_DIR" "$IWYU_DIR"
          fi

      - name: Build project
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export CC="ccache ${{ matrix.cc }}"
          export CXX="ccache ${{ matrix.cxx }}"
          mkdir -p toonz/build
          cd toonz/build
          cmake ../sources -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DWITH_TRANSLATION=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          ninja

      - name: Upload build directory
        if: matrix.compiler == 'clang'
        uses: actions/upload-artifact@v4
        with:
          name: toonz-build-dir
          path: toonz/build

  iwyu-analysis:
    name: IWYU Analysis (Chunk ${{ matrix.chunk }})
    needs: build
    if: always()
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        chunk: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: toonz-build-dir
          path: toonz/build

      - name: Run IWYU analysis (chunked)
        run: |
          cd toonz/build

          # Get all C/C++ source files
          jq -r '.[].file' compile_commands.json | grep -E "^.*/sources/.*\.(cpp|c)$" > source_files.txt

          # Split into 4 chunks (chunk_aa, ab, ac, ad)
          split -n l/4 source_files.txt chunk_

          # Map matrix.chunk (1-4) to chunk file
          declare -a CHUNKS=(chunk_aa chunk_ab chunk_ac chunk_ad)
          CHUNK_FILE="${CHUNKS[$(( ${{ matrix.chunk }} - 1 ))]}"

          echo "Running IWYU on $CHUNK_FILE"
          cp "$CHUNK_FILE" chunk_files.txt

          # Run IWYU only on the current chunk
          cat chunk_files.txt | xargs -n 1 -P $(nproc) -I {} \
            iwyu_tool.py -p . "{}" -- -Xiwyu --mapping_file=/usr/local/share/include-what-you-use/qt5_11.imp \
            2>/dev/null | tee iwyu_report.txt

          # Save actionable includes
          grep -E 'should (add|remove)' iwyu_report.txt > actionable_items.txt || true

      - name: Upload IWYU report
        uses: actions/upload-artifact@v4
        with:
          name: iwyu-report-chunk-${{ matrix.chunk }}
          path: |
            toonz/build/iwyu_report.txt
            toonz/build/actionable_items.txt

      - name: Summary
        run: |
          cd toonz/build
          echo "### Chunk ${{ matrix.chunk }} Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Files Processed:** $(wc -l < chunk_files.txt)" >> $GITHUB_STEP_SUMMARY
          echo "**Includes to add/remove:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ -s actionable_items.txt ]; then
            head -n 10 actionable_items.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No actionable includes found in this chunk." >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
