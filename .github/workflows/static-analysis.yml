name: Linux Code Analysis

on: [push, pull_request]

jobs:
  Ubuntu:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
    - uses: actions/checkout@v4

    - name: Install libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake pkg-config ninja-build ccache libboost-all-dev qtbase5-dev qt5-qmake qtscript5-dev qttools5-dev qttools5-dev-tools qtmultimedia5-dev qtwayland5 libqt5svg5-dev libqt5opengl5-dev libqt5multimedia5-plugins libqt5serialport5-dev libsuperlu-dev liblz4-dev libusb-1.0-0-dev liblzo2-dev libpng-dev libjpeg-dev libglew-dev freeglut3-dev libfreetype6-dev libjson-c-dev libmypaint-dev libopencv-dev libturbojpeg-dev libomp-dev libfuse2 clang-tidy

    - name: Set up cache
      run: mkdir -p /home/runner/.ccache

    - uses: actions/cache@v4
      with:
        path: /home/runner/.ccache
        key: ${{ runner.os }}-${{ matrix.compiler }}-${{ github.sha }}
        restore-keys: | 
          ${{ runner.os }}-${{ matrix.compiler }}-
          ${{ runner.os }}-

    - name: Build libtiff
      run: |
        if [ ! -f thirdparty/tiff-4.0.3/libtiff.a ]; then
          cd thirdparty/tiff-4.0.3
          CFLAGS='-fPIC' CXXFLAGS='-fPIC' ./configure --disable-jbig
          make -j $(nproc)
        fi

    - name: Build
      run: |
        export CCACHE_DIR=/home/runner/.ccache
        export CC="ccache ${{ matrix.cc }}"
        export CXX="ccache ${{ matrix.cxx }}"
        cd toonz
        mkdir build
        cd build
        cmake ../sources -G Ninja -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DCMAKE_C_COMPILER=${{ matrix.cc }} -DWITH_TRANSLATION=OFF
        ninja

    - name: Run Static Analysis (Clang-Tidy)
      if: matrix.compiler == 'clang'
      run: |
        echo "Executando análise estática do código com clang-tidy..."
        find toonz/sources -name "*.cpp" | xargs clang-tidy -p=toonz/build

    - name: Run Static Analysis (GCC - Wall)
      if: matrix.compiler == 'gcc'
      run: |
        echo "Executando análise estática do código com GCC..."
        find toonz/sources -name "*.cpp" | xargs gcc -Wall -Wextra -Werror -Itoonz/sources -Itoonz/sources/toonzqt -o /dev/null

    - name: Run Static Analysis (Cppcheck)
      run: |
        echo "Executando análise estática com cppcheck..."
        cppcheck --enable=warning,performance,portability --suppress=missingIncludeSystem --force toonz/sources/
